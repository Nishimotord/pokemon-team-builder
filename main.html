<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf Green Professional Strategizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
    :root {
        --bg: #f4f4f9; --card-bg: #ffffff; --text: #333; --border: #ddd;
        --pk-blue: #3b4cca; --pk-yellow: #ffde00; --pk-red: #cc0000;
    }
    body.dark-mode {
        --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #f0f0f0; --border: #444;
    }

    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; margin: 0; }

    /* Layout & Containers */
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .team-container { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--border); position: relative; }
    .team-slots { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
    .slot {
        min-height: 280px; /* Adjust to match your createCardHTML height */
        background: rgba(0,0,0,0.05);
        border: 2px dashed var(--border);
        border-radius: 10px;
        display: block; /* Ensures children stack so we can count them */
    }
    /* Sticky Controls */
    .controls { 
        background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; 
        position: sticky; top: 10px; z-index: 100; border: 1px solid var(--border); 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
    }

    /* Common UI Elements */
    .type-pill { padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .type-pill.active { border-color: var(--pk-yellow); box-shadow: 0 0 8px var(--pk-yellow); }
    .toggle-btn, .btn-sort { padding: 8px 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 0.8rem; }
    .active { background: var(--pk-blue) !important; color: white !important; }

    /* Card Components */
    #main-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding: 10px; }
    .card { padding: 10px; display: flex; flex-direction: column; position: relative; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; }
    .id-badge { display: block; text-align: center; font-size: 0.75rem; opacity: 0.6; font-family: monospace; }
    .card img { width: 75px; height: 75px; image-rendering: pixelated; margin: 0 auto; }
    .card-header { text-align: center; margin: 8px 0; }
    .card-name { text-transform: capitalize; font-size: 0.9rem; font-weight: bold; }
    .type-box { display: flex; justify-content: center; gap: 4px; margin-top: 4px; }

    /* Stats Visualization */
    .stats-box { background: rgba(0,0,0,0.08); border-radius: 5px; padding: 8px; display: flex; flex-direction: column; gap: 4px; font-family: monospace; font-size: 0.7rem; }
    .stat-row { display: flex; align-items: center; gap: 8px; border-radius: 2px; transition: 0.2s; }
    .stat-label { width: 30px; font-weight: bold; }
    .stat-bar-bg { flex-grow: 1; height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; }

    /* Color Tiers & Highlighting */
    .bar-low { background: #ff4d4d; }
    .bar-mid { background: #ffcc00; }
    .bar-high { background: #4caf50; }
    .stat-row.max-stat { outline: 2px solid rgb(0, 0, 0); outline-offset: 1px; background: rgba(255, 255, 255, 0.1); }
    body.dark-mode .stat-row.max-stat { outline-color: #fff; background: rgba(255, 255, 255, 0.15); }
    
    .sortable-swap-highlight {
        background-color: rgba(255, 222, 0, 0.3) !important; /* Poke-Yellow tint */
        border-radius: 10px;
    }
    </style>
</head>

    let activeSorts = [];
    let activeFilters = [];
    let filterLogic = 'OR';

    function init() {
        const filterContainer = document.getElementById('type-filters');
        Object.keys(typeColors).forEach(type => {
            const span = document.createElement('span');
            span.className = 'type-pill';
            span.style.backgroundColor = typeColors[type];
            span.innerText = type;
            span.onclick = () => toggleFilter(type, span);
            filterContainer.insertBefore(span, filterContainer.lastElementChild);
        });

        const sortContainer = document.getElementById('sort-btns');
        ['id','hp','atk','def','spa','spd','spe', 'total'].forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'btn-sort';
            btn.dataset.stat = s;
            btn.innerText = s.toUpperCase();
            btn.onclick = () => handleSort(s);
            sortContainer.appendChild(btn);
        });

        addTeamRow();
        render();
    }

    function toggleFilter(type, el) {
        if(activeFilters.includes(type)) activeFilters = activeFilters.filter(t => t !== type);
        else activeFilters.push(type);
        el.classList.toggle('active');
        render();
    }

    function resetFilters() {
        activeFilters = [];
        document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
        render();
    }

    function toggleLogic() {
        filterLogic = filterLogic === 'OR' ? 'AND' : 'OR';
        document.getElementById('logic-toggle').innerText = filterLogic;
        render();
    }

    function handleSort(stat) {
        const idx = activeSorts.findIndex(s => s.stat === stat);
        if(idx === -1) activeSorts.push({stat, dir:'desc'});
        else if(activeSorts[idx].dir === 'desc') activeSorts[idx].dir = 'asc';
        else activeSorts.splice(idx, 1);
        render();
    }

    function resetSort() {
        activeSorts = [];
        render();
    }

    function render() {
        const container = document.getElementById('main-list');
        let data = pokemonData.filter(p => {
            if (activeFilters.length === 0) return true;
            return filterLogic === 'OR' 
                ? activeFilters.some(t => p.types.includes(t)) 
                : activeFilters.every(t => p.types.includes(t));
        });

        data.sort((a,b) => {
            for(let s of activeSorts) {
                if(a[s.stat] !== b[s.stat]) 
                    return s.dir === 'desc' ? b[s.stat] - a[s.stat] : a[s.stat] - b[s.stat];
            }
            return 0;
        });

        container.innerHTML = data.map(p => createCardHTML(p)).join('');
        updateSortUI();
    }
    function createCardHTML(p) {
        const stats = ['hp','atk','def','spa','spd','spe'];
        const maxVal = Math.max(...stats.map(s => p[s]));

        const statsHTML = stats.map(s => {
            const val = p[s];
            const width = Math.min((val / 160) * 100, 100);
            let tier = val < 60 ? 'bar-low' : val > 90 ? 'bar-high' : 'bar-mid';
            
            return `
                <div class="stat-row ${val === maxVal ? 'max-stat' : ''}">
                    <span class="stat-label">${s.toUpperCase()}</span>
                    <span style="width: 25px;">${val}</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill ${tier}" style="width: ${width}%"></div>
                    </div>
                </div>`;
        }).join('');

        return `
            <div class="card" data-id="${p.id}" onclick="handleCardClick(this, ${p.id})">
                <span class="id-badge">#${String(p.id).padStart(3, '0')}</span>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="${p.name}">
                <div class="card-header">
                    <span class="card-name">${p.name}</span>
                    <div class="type-box">
                        ${p.types.map(t => `<span class="type-pill" style="background:${typeColors[t]}">${t}</span>`).join('')}
                    </div>
                </div>
                <div class="stats-box">${statsHTML}</div>
                <div class="id-badge" style="margin-top:8px; opacity:1">TOTAL: ${p.total}</div>
            </div>`;
    }
    function updateSortUI() {
        document.querySelectorAll('.btn-sort').forEach(btn => {
            const s = activeSorts.find(as => as.stat === btn.dataset.stat);
            if(s) {
                btn.classList.add('active');
                btn.innerHTML = `${s.stat.toUpperCase()} ${s.dir === 'desc' ? '▼' : '▲'} <span class="sort-order-badge">${activeSorts.indexOf(s)+1}</span>`;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = btn.dataset.stat.toUpperCase();
            }
        });
    }

    // 3. Updated addTeamRow (Swap & Replace Logic)
    function addTeamRow() {
        const teamsList = document.getElementById('teams-list');
        const container = document.createElement('div');
        container.className = 'team-container';
        
        container.innerHTML = `
            <button class="delete-row" onclick="this.parentElement.remove()">×</button>
            <div class="team-slots">
                ${'<div class="slot"></div>'.repeat(6)}
            </div>
        `;
        
        teamsList.appendChild(container);

        container.querySelectorAll('.slot').forEach(slot => {
            new Sortable(slot, {
                group: 'shared',
                animation: 150,
                // Disable the global 'swap' plugin as it interferes with "move-to-empty"
                swap: false, 
                onAdd: function (evt) {
                    const incoming = evt.item;
                    const destinationSlot = evt.to;
                    const sourceSlot = evt.from;
                    
                    // 1. REPLACEMENT LOGIC (From Library)
                    if (sourceSlot.id === 'main-list') {
                        if (destinationSlot.children.length > 1) {
                            // Remove the old resident, keep the new one
                            Array.from(destinationSlot.children).forEach(card => {
                                if (card !== incoming) card.remove();
                            });
                        }
                    } 
                    // 2. SWAP LOGIC (Between Team Slots)
                    else {
                        if (destinationSlot.children.length > 1) {
                            // Find the card that was already in this slot
                            const existingCard = Array.from(destinationSlot.children).find(card => card !== incoming);
                            // Move the existing card back to where the incoming one came from
                            sourceSlot.appendChild(existingCard);
                        }
                    }
                }
            });
        });
    }
    function handleCardClick(el, pokemonId) {
        // If the card is already in a team slot, clicking it removes it
        if (el.closest('.slot')) {
            el.remove();
            return;
        }
        
        // Otherwise, find the first empty slot in any team row
        const allSlots = Array.from(document.querySelectorAll('.slot'));
        const emptySlot = allSlots.find(slot => slot.children.length === 0);
        
        if (emptySlot) {
            const p = pokemonData.find(x => x.id === pokemonId);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = createCardHTML(p);
            emptySlot.appendChild(tempDiv.firstElementChild);
        }
    }
        // Helper to keep code clean
    function addRemoveButton(card) {
        if (card.querySelector('.remove-card')) return;
        const btn = document.createElement('button');
        btn.className = 'remove-card';
        btn.innerHTML = '×';
        btn.onclick = (e) => { e.stopPropagation(); card.remove(); };
        card.appendChild(btn);
    }
    new Sortable(document.getElementById('main-list'), {
        group: {
            name: 'shared',
            pull: 'clone', // Clones the card so it stays in the list
            put: false    // Prevents team cards from being dropped into the library
        },
        animation: 150,
        sort: false // Keeps library order static
    });

    init();
</script>
