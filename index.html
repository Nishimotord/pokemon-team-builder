<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Pokemon Team Builder (FR/LG)</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="dark-mode">
<div class="select-banner" id="select-banner">Tap a Pok&#233;mon to fill the slot <button onclick="cancelSelectingSlot()">Cancel</button></div>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="team-drawer" id="team-drawer">
    <div class="drawer-header">
        <div class="drawer-header-left">
            <img class="drawer-pokeball" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="pokeball">
            <h2>My Teams</h2>
        </div>
        <div class="drawer-show-row" id="drawer-show-row">
            <!-- populated by JS to mirror the Show buttons -->
        </div>
        <div class="drawer-close-btn-wrap"><button class="drawer-close-btn" onclick="closeDrawer()">&#10005;</button></div>
    </div>
    <div class="drawer-body" id="teams-list"></div>
    <div class="drawer-footer">
        <button class="toggle-btn" style="background:var(--pk-blue);color:white;width:100%;border-color:var(--pk-blue)" onclick="addTeamRow()">+ Add Team</button>
    </div>
</div>
<div class="header-row">
    <strong style="font-size:1rem">&#128218; Pokemon Team Builder (FR/LG)</strong>
    <button class="toggle-btn" onclick="document.body.classList.toggle('dark-mode')">&#127763;</button>
</div>
<div class="controls">
    <div class="filter-row" id="type-filters">
        <strong>Types:</strong>
        <button class="toggle-btn" style="border-color:var(--pk-red);color:var(--pk-red);font-size:0.7rem;padding:4px 8px" onclick="resetFilters()">Reset</button>
    </div>
    <div class="filter-row">
        <strong>Logic:</strong>
        <button class="toggle-btn active" id="logic-toggle" onclick="toggleLogic()">OR</button>
    </div>
    <div class="filter-row">
        <strong>Sort:</strong>
        <div id="sort-btns" style="display:inline-flex;gap:4px;flex-wrap:wrap"></div>
        <button class="toggle-btn" style="border-color:var(--pk-red);color:var(--pk-red);font-size:0.7rem;padding:4px 8px" onclick="resetSort()">Reset</button>
    </div>
    <div class="filter-row">
        <strong>Show:</strong>
        <button class="btn-display active" id="toggle-stats" onclick="toggleDisplay('stats')">&#128202; Stats</button>
        <button class="btn-display active" id="toggle-typechart" onclick="toggleDisplay('typechart')">&#128737; Type Defenses</button>
        <button class="btn-display active" id="toggle-evo" onclick="toggleDisplay('evo')">&#128260; Evolution</button>
        <button class="btn-display active" id="toggle-moves" onclick="toggleDisplay('moves')">&#129354; Moves</button>
    </div>
</div>
<div id="main-list"></div>
<button class="fab-team" onclick="openDrawer()"><img class="fab-pokeball" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="pokeball"> Teams <span class="fab-badge" id="team-count">0</span></button>

<script src="data/statData.js"></Script>
<script src="data/movesets.js"></Script>
<script src="data/evolutionData.js"></Script>
<script src="data/typeEffDataset.js"></Script>
<script src="script.js"></Script>
</body>
</html>
