<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Leaf Green Strategizer</title>
    <style>
    :root {
        --bg: #f4f4f9; --card-bg: #ffffff; --text: #333; --border: #ddd;
        --pk-blue: #3b4cca; --pk-yellow: #ffde00; --pk-red: #cc0000;
        --drawer-width: 340px;
    }
    body.dark-mode {
        --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #f0f0f0; --border: #444;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 12px; transition: background 0.3s, color 0.3s; margin: 0; overflow-x: hidden; }

    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
    .header-left { display: flex; gap: 8px; align-items: center; }

    /* Drawer overlay */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
    .drawer-overlay.open { display: block; }

    /* Team drawer */
    .team-drawer {
        position: fixed; top: 0; right: -100%; width: min(var(--drawer-width), 100vw);
        height: 100%; background: var(--card-bg); z-index: 201;
        transition: right 0.35s cubic-bezier(.4,0,.2,1);
        display: flex; flex-direction: column;
        box-shadow: -4px 0 20px rgba(0,0,0,0.3);
    }
    .team-drawer.open { right: 0; }
    .drawer-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 14px 16px; border-bottom: 2px solid var(--border);
        background: var(--pk-blue); color: white; flex-shrink: 0;
    }
    .drawer-header h2 { margin: 0; font-size: 1rem; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 12px; }
    .drawer-footer { padding: 10px 12px; border-top: 2px solid var(--border); flex-shrink: 0; }

    /* Team container in drawer */
    .team-container { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 2px solid var(--border); }
    .team-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .team-name-input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-weight: bold; font-size: 0.9rem; width: 160px; outline: none; padding: 2px 4px; }
    .team-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .slot {
        min-height: 110px; background: rgba(0,0,0,0.05); border: 2px dashed var(--border);
        border-radius: 8px; display: flex; align-items: center; justify-content: center;
        cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.2s, background 0.2s;
    }
    .slot:not(:has(.team-card))::after { content: '+'; font-size: 1.5rem; opacity: 0.25; pointer-events: none; }
    .slot:not(:has(.team-card)):hover { border-color: var(--pk-blue); background: rgba(59,76,202,0.1); }

    /* Mini card in team slots */
    .team-card { width: 100%; padding: 5px; display: flex; flex-direction: column; align-items: center; position: relative; background: var(--card-bg); border-radius: 6px; }
    .team-card img { width: 54px; height: 54px; image-rendering: pixelated; }
    .team-card .tc-name { font-size: 0.62rem; font-weight: bold; text-align: center; text-transform: capitalize; margin-top: 2px; }
    .team-card .tc-types { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; margin-top: 2px; }
    .team-card .tc-type { font-size: 0.48rem; padding: 1px 4px; border-radius: 10px; color: white; font-weight: bold; text-transform: uppercase; text-shadow: 1px 1px 1px rgba(0,0,0,0.4); }
    .remove-btn { position: absolute; top: 2px; right: 2px; background: var(--pk-red); color: white; border: none; border-radius: 50%; width: 15px; height: 15px; font-size: 0.65rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }

    /* FAB */
    .fab-team {
        position: fixed; bottom: 20px; right: 20px; z-index: 150;
        background: var(--pk-blue); color: var(--pk-yellow);
        border: 3px solid var(--pk-yellow); border-radius: 50px;
        padding: 10px 18px; font-weight: bold; font-size: 0.9rem;
        cursor: pointer; box-shadow: 0 4px 15px rgba(59,76,202,0.5);
        display: flex; align-items: center; gap: 8px;
        -webkit-tap-highlight-color: transparent; user-select: none;
        transition: transform 0.15s;
    }
    .fab-team:active { transform: scale(0.95); }
    .fab-badge { background: var(--pk-red); color: white; border-radius: 10px; padding: 1px 6px; font-size: 0.7rem; }

    /* Controls */
    .controls {
        background: var(--card-bg); padding: 12px; border-radius: 12px; margin-bottom: 12px;
        position: sticky; top: 0; z-index: 100; border: 1px solid var(--border);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-row strong { font-size: 0.8rem; white-space: nowrap; }

    .type-pill { padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; user-select: none; }
    .type-pill.active { border-color: var(--pk-yellow); box-shadow: 0 0 8px var(--pk-yellow); }

    .toggle-btn, .btn-sort, .btn-display { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 0.75rem; -webkit-tap-highlight-color: transparent; user-select: none; white-space: nowrap; transition: 0.15s; }
    .active { background: var(--pk-blue) !important; color: white !important; border-color: var(--pk-blue) !important; }
    .btn-display.active { background: #27ae60 !important; border-color: #27ae60 !important; color: white !important; }
    .btn-display.coming-soon { border-style: dashed; opacity: 0.55; cursor: default; }

    /* Main list */
    #main-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; padding: 4px; padding-bottom: 80px; }

    /* Pokemon card */
    .card { padding: 10px; display: flex; flex-direction: column; position: relative; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.12s; }
    .card:active { transform: scale(0.97); }
    .card.in-team { border-color: var(--pk-yellow); box-shadow: 0 0 0 2px var(--pk-yellow); }

    .id-badge { display: block; text-align: center; font-size: 0.7rem; opacity: 0.55; font-family: monospace; }
    .card img { width: 72px; height: 72px; image-rendering: pixelated; margin: 0 auto; display: block; }
    .card-header { text-align: center; margin: 6px 0; }
    .card-name { text-transform: capitalize; font-size: 0.88rem; font-weight: bold; }
    .type-box { display: flex; justify-content: center; gap: 4px; margin-top: 4px; }

    /* Stats section */
    .section-stats { }
    .section-stats.hidden { display: none; }
    .stats-box { background: rgba(0,0,0,0.08); border-radius: 5px; padding: 7px; display: flex; flex-direction: column; gap: 3px; font-family: monospace; font-size: 0.68rem; }
    .stat-row { display: flex; align-items: center; gap: 6px; border-radius: 2px; }
    .stat-label { width: 28px; font-weight: bold; }
    .stat-bar-bg { flex-grow: 1; height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; }
    .bar-low { background: #ff4d4d; }
    .bar-mid { background: #ffcc00; }
    .bar-high { background: #4caf50; }
    .stat-row.max-stat { outline: 2px solid rgb(0,0,0); outline-offset: 1px; background: rgba(255,255,255,0.1); }
    body.dark-mode .stat-row.max-stat { outline-color: #fff; background: rgba(255,255,255,0.15); }
    .card-total { text-align: center; font-size: 0.75rem; font-weight: bold; margin-top: 6px; opacity: 0.85; }

    /* Selecting mode banner */
    .select-banner { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 300; background: var(--pk-blue); color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 0.9rem; }
    .select-banner.show { display: block; }
    .select-banner button { background: var(--pk-red); color: white; border: none; border-radius: 4px; padding: 4px 10px; margin-left: 10px; cursor: pointer; font-weight: bold; }

    .delete-row-btn { background: none; border: none; color: var(--pk-red); font-size: 1rem; cursor: pointer; padding: 2px 6px; -webkit-tap-highlight-color: transparent; }

    @media (max-width: 480px) {
        #main-list { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        body { padding: 8px; }
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>

    <div class="drawer-footer">

    </div>
</div>

<!-- Header -->
<div class="header-row">
    <strong style="font-size:1rem">🌿 LG Strategizer</strong>
    <button class="toggle-btn" onclick="document.body.classList.toggle('dark-mode')">🌓</button>
</div>

<!-- Controls -->
<div class="controls">
    <div class="filter-row" id="type-filters">

        <button class="toggle-btn" style="border-color:var(--pk-red);color:var(--pk-red);font-size:0.7rem;padding:4px 8px" onclick="resetFilters()">Reset</button>
    </div>
    <div class="filter-row">
        <strong>Logic:</strong>
        <button class="toggle-btn active" id="logic-toggle" onclick="toggleLogic()">OR</button>
    </div>
    <div class="filter-row">
        <strong>Sort:</strong>
        <div id="sort-btns" style="display:inline-flex;gap:4px;flex-wrap:wrap"></div>
        <button class="toggle-btn" style="border-color:var(--pk-red);color:var(--pk-red);font-size:0.7rem;padding:4px 8px" onclick="resetSort()">Reset</button>
    </div>
    <div class="filter-row">
        <strong>Show:</strong>
        <button class="btn-display active" id="toggle-stats" onclick="toggleDisplay('stats')">📊 Stats</button>
        <button class="btn-display coming-soon" title="Coming soon" disabled>🥊 Moves</button>
        <button class="btn-display coming-soon" title="Coming soon" disabled>⚡ Type Chart</button>
        <button class="btn-display coming-soon" title="Coming soon" disabled>🔀 Evolution</button>
    </div>
</div>

<div id="main-list"></div>

<!-- Floating team button -->
<button class="fab-team" onclick="openDrawer()">
    🏆 Teams <span class="fab-badge" id="team-count">0</span>
</button>

// ===== STATE =====
let activeSorts = [];
let activeFilters = [];
let filterLogic = 'OR';
let displayToggles = { stats: true };
let teams = [];
let teamIdCounter = 0;
let selectingSlot = null;

// ===== DISPLAY TOGGLE =====
function toggleDisplay(section) {
    displayToggles[section] = !displayToggles[section];
    document.getElementById('toggle-' + section).classList.toggle('active', displayToggles[section]);
    document.querySelectorAll('#main-list .section-' + section).forEach(el => {
        el.classList.toggle('hidden', !displayToggles[section]);
    });
}

// ===== TEAMS =====
function addTeamRow() {
    const team = { id: ++teamIdCounter, name: 'Team ' + teamIdCounter, slots: [null,null,null,null,null,null] };
    teams.push(team);
    renderTeams();
}

function removeTeam(teamId) {
    teams = teams.filter(t => t.id !== teamId);
    renderTeams();
    updateFABCount();
    updateListHighlights();
}

function renameTeam(teamId, name) {
    const t = teams.find(t => t.id === teamId);
    if(t) t.name = name;
}

function removeFromSlot(teamId, slotIndex, e) {
    if(e) e.stopPropagation();
    const t = teams.find(t => t.id === teamId);
    if(t) { t.slots[slotIndex] = null; renderTeams(); updateFABCount(); updateListHighlights(); }
}

function addToSlot(teamId, slotIndex, pokemonId) {
    const t = teams.find(t => t.id === teamId);
    if(t) { t.slots[slotIndex] = pokemonId; renderTeams(); updateFABCount(); updateListHighlights(); }
}

function startSelectingSlot(teamId, slotIndex) {
    selectingSlot = { teamId, slotIndex };
    document.getElementById('select-banner').classList.add('show');
    closeDrawer();
}

function cancelSelectingSlot() {
    selectingSlot = null;
    document.getElementById('select-banner').classList.remove('show');
}

function updateFABCount() {
    const filled = teams.reduce((n, t) => n + t.slots.filter(s => s !== null).length, 0);
    document.getElementById('team-count').textContent = filled;
}

function updateListHighlights() {
    const inTeam = new Set(teams.flatMap(t => t.slots.filter(s => s !== null)));
    document.querySelectorAll('#main-list .card').forEach(card => {
        card.classList.toggle('in-team', inTeam.has(parseInt(card.dataset.id)));
    });
}

function renderTeams() {
    const container = document.getElementById('teams-list');
    container.innerHTML = '';

    if(teams.length === 0) {
        container.innerHTML = '<p style="opacity:0.5;text-align:center;font-size:0.85rem;margin-top:30px">No teams yet.<br>Tap "+ Add Team" to get started.</p>';
        return;
    }

    teams.forEach(team => {
        const div = document.createElement('div');
        div.className = 'team-container';

        let slotsHTML = '';
        team.slots.forEach((pokemonId, slotIdx) => {
            if(pokemonId !== null) {
                const p = pokemonData.find(x => x.id === pokemonId);
                slotsHTML += `<div class="slot">
                    <div class="team-card">
                        <button class="remove-btn" onclick="removeFromSlot(${team.id},${slotIdx},event)">×</button>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="${p.name}">
                        <span class="tc-name">${p.name}</span>
                        <div class="tc-types">${p.types.map(t=>`<span class="tc-type" style="background:${typeColors[t]}">${t}</span>`).join('')}</div>
                    </div>
                </div>`;
            } else {
                slotsHTML += `<div class="slot" onclick="startSelectingSlot(${team.id},${slotIdx})"></div>`;
            }
        });

        div.innerHTML = `
            <div class="team-label-row">
                <input class="team-name-input" value="${team.name}"
                    oninput="renameTeam(${team.id},this.value)">
                <button class="delete-row-btn" onclick="removeTeam(${team.id})">🗑</button>
            </div>
            <div class="team-slots">${slotsHTML}</div>
        `;
        container.appendChild(div);
    });
}

// ===== DRAWER =====
function openDrawer() { document.getElementById('team-drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('team-drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }

// ===== CARD CLICK =====
function handleCardClick(el, pokemonId) {
    if(selectingSlot) {
        addToSlot(selectingSlot.teamId, selectingSlot.slotIndex, pokemonId);
        cancelSelectingSlot();
        openDrawer();
        return;
    }
    if(teams.length === 0) addTeamRow();
    for(const t of teams) {
        const idx = t.slots.indexOf(null);
        if(idx !== -1) { addToSlot(t.id, idx, pokemonId); return; }
    }
    openDrawer(); // all slots full
}

// ===== FILTER / SORT =====
function toggleFilter(type, el) {
    if(activeFilters.includes(type)) activeFilters = activeFilters.filter(t => t !== type);
    else activeFilters.push(type);
    el.classList.toggle('active');
    render();
}
function resetFilters() {
    activeFilters = [];
    document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
    render();
}
function toggleLogic() {
    filterLogic = filterLogic === 'OR' ? 'AND' : 'OR';
    document.getElementById('logic-toggle').innerText = filterLogic;
    render();
}
function handleSort(stat) {
    const idx = activeSorts.findIndex(s => s.stat === stat);
    if(idx === -1) activeSorts.push({stat, dir:'desc'});
    else if(activeSorts[idx].dir === 'desc') activeSorts[idx].dir = 'asc';
    else activeSorts.splice(idx, 1);
    render();
}
function resetSort() { activeSorts = []; render(); }

// ===== RENDER =====
function render() {
    const container = document.getElementById('main-list');
    let data = pokemonData.filter(p => {
        if(activeFilters.length === 0) return true;
        return filterLogic === 'OR'
            ? activeFilters.some(t => p.types.includes(t))
            : activeFilters.every(t => p.types.includes(t));
    });
    data.sort((a,b) => {
        for(let s of activeSorts) {
            if(a[s.stat] !== b[s.stat])
                return s.dir === 'desc' ? b[s.stat]-a[s.stat] : a[s.stat]-b[s.stat];
        }
        return 0;
    });
    container.innerHTML = data.map(p => createCardHTML(p)).join('');
    updateSortUI();
    updateListHighlights();
}

function createCardHTML(p) {
    const stats = ['hp','atk','def','spa','spd','spe'];
    const maxVal = Math.max(...stats.map(s => p[s]));
    const statsHTML = stats.map(s => {
        const val = p[s];
        const width = Math.min((val/160)*100, 100);
        const tier = val < 60 ? 'bar-low' : val > 90 ? 'bar-high' : 'bar-mid';
        return `<div class="stat-row ${val===maxVal?'max-stat':''}">
            <span class="stat-label">${s.toUpperCase()}</span>
            <span style="width:22px">${val}</span>
            <div class="stat-bar-bg"><div class="stat-bar-fill ${tier}" style="width:${width}%"></div></div>
        </div>`;
    }).join('');

    const statsHidden = displayToggles.stats ? '' : ' hidden';
    return `<div class="card" data-id="${p.id}" onclick="handleCardClick(this,${p.id})">
        <span class="id-badge">#${String(p.id).padStart(3,'0')}</span>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="${p.name}">
        <div class="card-header">
            <span class="card-name">${p.name}</span>
            <div class="type-box">${p.types.map(t=>`<span class="type-pill" style="background:${typeColors[t]}">${t}</span>`).join('')}</div>
        </div>
        <div class="section-stats${statsHidden}">
            <div class="stats-box">${statsHTML}</div>
            <div class="card-total">TOTAL: ${p.total}</div>
        </div>
    </div>`;
}

function updateSortUI() {
    document.querySelectorAll('.btn-sort').forEach(btn => {
        const s = activeSorts.find(as => as.stat === btn.dataset.stat);
        if(s) {
            btn.classList.add('active');
            btn.innerHTML = `${s.stat.toUpperCase()} ${s.dir==='desc'?'▼':'▲'} <span style="background:var(--pk-red);color:white;border-radius:10px;padding:0 4px;font-size:0.6rem">${activeSorts.indexOf(s)+1}</span>`;
        } else {
            btn.classList.remove('active');
            btn.innerHTML = btn.dataset.stat.toUpperCase();
        }
    });
}

// ===== INIT =====
function init() {
    const filterContainer = document.getElementById('type-filters');
    Object.keys(typeColors).forEach(type => {
        const span = document.createElement('span');
        span.className = 'type-pill';
        span.style.backgroundColor = typeColors[type];
        span.innerText = type;
        span.onclick = () => toggleFilter(type, span);
        filterContainer.insertBefore(span, filterContainer.lastElementChild);
    });

    const sortContainer = document.getElementById('sort-btns');
    ['id','hp','atk','def','spa','spd','spe','total'].forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'btn-sort';
        btn.dataset.stat = s;
        btn.innerText = s.toUpperCase();
        btn.onclick = () => handleSort(s);
        sortContainer.appendChild(btn);
    });

    addTeamRow();
    render();
}

init();
</script>
