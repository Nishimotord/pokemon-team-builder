<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Leaf Green Strategizer</title>
    <style>
    :root {
        --bg: #f4f4f9; --card-bg: #ffffff; --text: #333; --border: #ddd;
        --pk-blue: #3b4cca; --pk-yellow: #ffde00; --pk-red: #cc0000;
        --drawer-width: 420px;
    }
    body.dark-mode { --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #f0f0f0; --border: #444; }
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 12px; transition: background 0.3s, color 0.3s; margin: 0; overflow-x: hidden; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
    .drawer-overlay.open { display: block; }
    .team-drawer {
        position: fixed; top: 0; right: -100%; width: min(var(--drawer-width), 100vw);
        height: 100%; background: var(--bg); z-index: 201;
        transition: right 0.35s cubic-bezier(.4,0,.2,1);
        display: flex; flex-direction: column;
        box-shadow: -4px 0 24px rgba(0,0,0,0.35);
    }
    .team-drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 2px solid var(--border); background: var(--pk-blue); color: white; flex-shrink: 0; }
    .drawer-header h2 { margin: 0; font-size: 1rem; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 12px; }
    .drawer-footer { padding: 10px 12px; border-top: 2px solid var(--border); flex-shrink: 0; }
    .team-container { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 12px; margin-bottom: 12px; border: 2px solid var(--border); }
    .team-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .team-name-input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-weight: bold; font-size: 0.9rem; width: 170px; outline: none; padding: 2px 4px; }
    .team-slots { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .slot { background: rgba(0,0,0,0.05); border: 2px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.2s, background 0.2s; min-height: 80px; }
    .slot.empty-slot::after { content: "+"; font-size: 1.8rem; opacity: 0.2; pointer-events: none; }
    .slot.empty-slot:hover { border-color: var(--pk-blue); background: rgba(59,76,202,0.08); }
    .slot .card { width: 100%; margin: 0; border: none; border-radius: 8px; cursor: default; padding: 8px; }
    .slot .card:active { transform: none; }
    .slot-remove-btn { position: absolute; top: 4px; right: 4px; z-index: 10; background: var(--pk-red); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
    .fab-team { position: fixed; bottom: 20px; right: 20px; z-index: 150; background: var(--pk-blue); color: var(--pk-yellow); border: 3px solid var(--pk-yellow); border-radius: 50px; padding: 10px 18px; font-weight: bold; font-size: 0.9rem; cursor: pointer; box-shadow: 0 4px 15px rgba(59,76,202,0.5); display: flex; align-items: center; gap: 8px; -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.15s; }
    .fab-team:active { transform: scale(0.95); }
    .fab-badge { background: var(--pk-red); color: white; border-radius: 10px; padding: 1px 7px; font-size: 0.7rem; min-width: 20px; text-align: center; }
    .controls { background: var(--card-bg); padding: 12px; border-radius: 12px; margin-bottom: 12px; position: sticky; top: 0; z-index: 100; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-row strong { font-size: 0.8rem; white-space: nowrap; }
    .type-pill { padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; user-select: none; }
    .type-pill.active { border-color: var(--pk-yellow); box-shadow: 0 0 8px var(--pk-yellow); }
    .toggle-btn, .btn-sort, .btn-display { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 0.75rem; -webkit-tap-highlight-color: transparent; user-select: none; white-space: nowrap; transition: 0.15s; }
    .active { background: var(--pk-blue) !important; color: white !important; border-color: var(--pk-blue) !important; }
    .btn-display.active { background: #27ae60 !important; border-color: #27ae60 !important; color: white !important; }
    .btn-display.coming-soon { border-style: dashed; opacity: 0.55; cursor: default; }

    /* Card grid - wide enough for 3-stage evo chain on one line (~220px min) */
    #main-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; padding: 4px; padding-bottom: 80px; }

    /* Base card */
    .card { padding: 10px; display: flex; flex-direction: column; position: relative; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.12s; }
    .card:active { transform: scale(0.97); }
    .card.in-team { border-color: var(--pk-yellow); box-shadow: 0 0 0 2px var(--pk-yellow); }

    /* Version-exclusive glows — subtle inner shadow on card border */
    .card.fr-exclusive { border-color: #e05555; box-shadow: 0 0 0 2px rgba(204,60,60,0.35), inset 0 0 12px rgba(204,60,60,0.08); }
    .card.lg-exclusive { border-color: #4a9e5c; box-shadow: 0 0 0 2px rgba(60,160,80,0.35), inset 0 0 12px rgba(60,160,80,0.08); }
    /* in-team overrides version color but keeps the glow subtle underneath */
    .card.in-team.fr-exclusive { border-color: var(--pk-yellow); box-shadow: 0 0 0 2px var(--pk-yellow), 0 0 8px rgba(204,60,60,0.3); }
    .card.in-team.lg-exclusive { border-color: var(--pk-yellow); box-shadow: 0 0 0 2px var(--pk-yellow), 0 0 8px rgba(60,160,80,0.3); }

    /* Version badge */
    .ver-badge { position: absolute; top: 4px; left: 4px; font-size: 0.5rem; font-weight: bold; padding: 1px 4px; border-radius: 3px; letter-spacing: 0.02em; z-index: 4; }
    .ver-badge.fr { background: rgba(204,60,60,0.8); color: white; }
    .ver-badge.lg { background: rgba(60,160,80,0.8); color: white; }

    .team-count-badge { display: none; position: absolute; top: 4px; right: 4px; background: var(--pk-red); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 0.65rem; font-weight: bold; align-items: center; justify-content: center; z-index: 5; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    .card.in-team .team-count-badge { display: flex; }
    .id-badge { display: block; text-align: center; font-size: 0.7rem; opacity: 0.55; font-family: monospace; }
    .card img { width: 72px; height: 72px; image-rendering: pixelated; margin: 0 auto; display: block; }
    .card-header { text-align: center; margin: 6px 0; }
    .card-name { text-transform: capitalize; font-size: 0.88rem; font-weight: bold; }
    .type-box { display: flex; justify-content: center; gap: 4px; margin-top: 4px; flex-wrap: wrap; }

    /* Stats */
    .section-stats.hidden { display: none; }
    .stats-box { background: rgba(0,0,0,0.08); border-radius: 5px; padding: 7px; display: flex; flex-direction: column; gap: 3px; font-family: monospace; font-size: 0.68rem; }
    .stat-row { display: flex; align-items: center; gap: 6px; border-radius: 2px; }
    .stat-label { width: 28px; font-weight: bold; }
    .stat-bar-bg { flex-grow: 1; height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; }
    .bar-low { background: #ff4d4d; } .bar-mid { background: #ffcc00; } .bar-high { background: #4caf50; }
    .stat-row.max-stat { outline: 2px solid #000; outline-offset: 1px; background: rgba(255,255,255,0.1); }
    body.dark-mode .stat-row.max-stat { outline-color: #fff; background: rgba(255,255,255,0.15); }
    .card-total { text-align: center; font-size: 0.75rem; font-weight: bold; margin-top: 6px; opacity: 0.85; }

    /* Evolution */
    .section-evo.hidden { display: none; }
    .evo-chain { margin-top: 6px; background: rgba(0,0,0,0.06); border-radius: 6px; padding: 5px 4px; display: flex; align-items: center; justify-content: center; flex-wrap: nowrap; gap: 1px; overflow-x: auto; }
    .evo-node { display: flex; flex-direction: column; align-items: center; gap: 1px; flex-shrink: 0; }
    .evo-node img { width: 38px; height: 38px; image-rendering: pixelated; }
    .evo-node .evo-name { font-size: 0.5rem; text-transform: capitalize; text-align: center; font-weight: bold; opacity: 0.85; max-width: 44px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .evo-node .evo-num { font-size: 0.44rem; opacity: 0.5; font-family: monospace; }
    .evo-node.current-mon img { filter: drop-shadow(0 0 3px var(--pk-yellow)); }
    .evo-arrow { display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; padding: 0 1px; flex-shrink: 0; line-height: 1; }
    .evo-arrow-label { font-size: 0.4rem; text-align: center; opacity: 0.7; max-width: 34px; line-height: 1.2; white-space: nowrap; }

    /* Moves */
    .section-moves.hidden { display: none; }
    .moves-table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 0.68rem; font-family: monospace; }
    .moves-table caption { text-align: left; font-size: 0.62rem; font-weight: bold; opacity: 0.6; padding-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    .moves-table th { background: rgba(0,0,0,0.12); padding: 3px 5px; text-align: left; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    .moves-table td { padding: 2px 5px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .moves-table tr:last-child td { border-bottom: none; }
    .moves-table td:first-child { width: 36px; opacity: 0.65; font-weight: bold; text-align: right; padding-right: 8px; }
    .moves-table tr:nth-child(even) td { background: rgba(0,0,0,0.04); }

    /* Banner / misc */
    .select-banner { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 300; background: var(--pk-blue); color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 0.9rem; }
    .select-banner.show { display: block; }
    .select-banner button { background: var(--pk-red); color: white; border: none; border-radius: 4px; padding: 4px 10px; margin-left: 10px; cursor: pointer; font-weight: bold; }
    .delete-row-btn { background: none; border: none; color: var(--pk-red); font-size: 1rem; cursor: pointer; padding: 2px 6px; }
    @media (max-width: 520px) {
        #main-list { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
        body { padding: 8px; }
        :root { --drawer-width: 100vw; }
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>

    </div>
</div>

    <div class="filter-row">

    </div>
</div>
<div id="main-list"></div>

const evoChainsByPokemon = {};
evoChains.forEach(chain => {
    chain.forEach(stage => {
        if(!evoChainsByPokemon[stage.id]) evoChainsByPokemon[stage.id] = [];
        evoChainsByPokemon[stage.id].push(chain);
    });
});

function triggerLabel(t) {
    if(!t) return '';
    if(t.type==='level') return 'Lv.'+t.lvl;
    if(t.type==='stone') return t.stone;
    if(t.type==='trade') return 'Trade';
    if(t.type==='friendship') return 'Friendship';
    return '';
}

function buildEvoChainHTML(pokemonId) {
    const chains = evoChainsByPokemon[pokemonId]||[];
    const seen=new Set();
    const unique=chains.filter(c=>{const k=c.map(s=>s.id).join('-');if(seen.has(k))return false;seen.add(k);return true;});
    return unique.map(chain=>{
        if(chain.length<=1) return '';
        let html='<div class="evo-chain">';
        chain.forEach((stage,i)=>{
            const isCur=stage.id===pokemonId;
            const pName=(pokemonData.find(p=>p.id===stage.id)||{name:'?'}).name;
            html+=`<div class="evo-node${isCur?' current-mon':''}">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${stage.id}.png" loading="lazy">
                <span class="evo-name">${pName}</span>
                <span class="evo-num">#${String(stage.id).padStart(3,'0')}</span>
            </div>`;
            if(i<chain.length-1&&chain[i].trigger){
                html+=`<div class="evo-arrow"><span>&#8594;</span><span class="evo-arrow-label">${triggerLabel(chain[i].trigger)}</span></div>`;
            }
        });
        return html+'</div>';
    }).join('');
}

function buildMovesHTML(pokemonId) {
    const moves = movesets[pokemonId];
    if(!moves||!moves.length) return '';
    // Sort by level asc (data is already sorted, but just in case)
    const sorted = [...moves].sort((a,b)=>a[0]-b[0]);
    const rows = sorted.map(([lvl,name])=>`<tr><td>${lvl}</td><td>${name}</td></tr>`).join('');
    return `<table class="moves-table">
        <caption>Level-up Moves</caption>
        <thead><tr><th>Lv</th><th>Move</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

// STATE
let activeSorts=[],activeFilters=[],filterLogic='OR';
let displayToggles={stats:true,evo:true,moves:true};
let teams=[],teamIdCounter=0,selectingSlot=null;

function toggleDisplay(section) {
    displayToggles[section]=!displayToggles[section];
    document.getElementById('toggle-'+section).classList.toggle('active',displayToggles[section]);
    document.querySelectorAll('.section-'+section).forEach(el=>el.classList.toggle('hidden',!displayToggles[section]));
}

function addTeamRow(){teams.push({id:++teamIdCounter,name:'Team '+teamIdCounter,slots:[null,null,null,null,null,null]});renderTeams();}
function removeTeam(id){teams=teams.filter(t=>t.id!==id);renderTeams();updateFABCount();updateListHighlights();}
function renameTeam(id,name){const t=teams.find(t=>t.id===id);if(t)t.name=name;}
function removeFromSlot(tid,si,e){if(e)e.stopPropagation();const t=teams.find(t=>t.id===tid);if(t){t.slots[si]=null;renderTeams();updateFABCount();updateListHighlights();}}
function addToSlot(tid,si,pid){const t=teams.find(t=>t.id===tid);if(t){t.slots[si]=pid;renderTeams();updateFABCount();updateListHighlights();}}
function startSelectingSlot(tid,si){selectingSlot={teamId:tid,slotIndex:si};document.getElementById('select-banner').classList.add('show');closeDrawer();}
function cancelSelectingSlot(){selectingSlot=null;document.getElementById('select-banner').classList.remove('show');}
function updateFABCount(){document.getElementById('team-count').textContent=teams.reduce((n,t)=>n+t.slots.filter(s=>s!==null).length,0);}
function countInTeams(pid){return teams.reduce((n,t)=>n+t.slots.filter(s=>s===pid).length,0);}
function updateListHighlights(){
    document.querySelectorAll('#main-list .card').forEach(card=>{
        const id=parseInt(card.dataset.id),count=countInTeams(id);
        card.classList.toggle('in-team',count>0);
        const b=card.querySelector('.team-count-badge');if(b)b.textContent=count;
    });
}

function renderTeams(){
    const container=document.getElementById('teams-list');
    container.innerHTML='';
    if(!teams.length){container.innerHTML='<p style="opacity:0.5;text-align:center;font-size:0.85rem;margin-top:30px">No teams yet.<br>Tap &quot;+ Add Team&quot; to get started.</p>';return;}
    teams.forEach(team=>{
        const div=document.createElement('div');div.className='team-container';
        let sh='';
        team.slots.forEach((pid,si)=>{
            if(pid!==null){
                const p=pokemonData.find(x=>x.id===pid);
                sh+=`<div class="slot" style="border:none;background:none;cursor:default;padding:0;overflow:visible;min-height:auto">
                    <button class="slot-remove-btn" onclick="removeFromSlot(${team.id},${si},event)">&#215;</button>
                    ${createCardHTML(p,false)}
                </div>`;
            } else {
                sh+=`<div class="slot empty-slot" onclick="startSelectingSlot(${team.id},${si})"></div>`;
            }
        });
        div.innerHTML=`<div class="team-label-row">
            <input class="team-name-input" value="${team.name}" oninput="renameTeam(${team.id},this.value)">
            <button class="delete-row-btn" onclick="removeTeam(${team.id})">&#128465;</button>
        </div><div class="team-slots">${sh}</div>`;
        container.appendChild(div);
    });
}

function openDrawer(){document.getElementById('team-drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('team-drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}

function handleCardClick(el,pid){
    if(selectingSlot){addToSlot(selectingSlot.teamId,selectingSlot.slotIndex,pid);cancelSelectingSlot();openDrawer();return;}
    if(!teams.length)addTeamRow();
    for(const t of teams){const i=t.slots.indexOf(null);if(i!==-1){addToSlot(t.id,i,pid);return;}}
    openDrawer();
}

function toggleFilter(type,el){if(activeFilters.includes(type))activeFilters=activeFilters.filter(t=>t!==type);else activeFilters.push(type);el.classList.toggle('active');render();}
function resetFilters(){activeFilters=[];document.querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));render();}
function toggleLogic(){filterLogic=filterLogic==='OR'?'AND':'OR';document.getElementById('logic-toggle').innerText=filterLogic;render();}
function handleSort(s){const i=activeSorts.findIndex(x=>x.stat===s);if(i===-1)activeSorts.push({stat:s,dir:'desc'});else if(activeSorts[i].dir==='desc')activeSorts[i].dir='asc';else activeSorts.splice(i,1);render();}
function resetSort(){activeSorts=[];render();}

function render(){
    let data=pokemonData.filter(p=>{if(!activeFilters.length)return true;return filterLogic==='OR'?activeFilters.some(t=>p.types.includes(t)):activeFilters.every(t=>p.types.includes(t));});
    data.sort((a,b)=>{for(let s of activeSorts){if(a[s.stat]!==b[s.stat])return s.dir==='desc'?b[s.stat]-a[s.stat]:a[s.stat]-b[s.stat];}return 0;});
    document.getElementById('main-list').innerHTML=data.map(p=>createCardHTML(p,true)).join('');
    updateSortUI();updateListHighlights();
}

function createCardHTML(p,clickable=true){
    const stats=['hp','atk','def','spa','spd','spe'];
    const maxVal=Math.max(...stats.map(s=>p[s]));
    const statsHTML=stats.map(s=>{
        const v=p[s],w=Math.min((v/160)*100,100),tier=v<60?'bar-low':v>90?'bar-high':'bar-mid';
        return `<div class="stat-row${v===maxVal?' max-stat':''}"><span class="stat-label">${s.toUpperCase()}</span><span style="width:22px">${v}</span><div class="stat-bar-bg"><div class="stat-bar-fill ${tier}" style="width:${w}%"></div></div></div>`;
    }).join('');
    const sH=displayToggles.stats?'':' hidden';
    const eH=displayToggles.evo?'':' hidden';
    const mH=displayToggles.moves?'':' hidden';
    const evoHTML=buildEvoChainHTML(p.id);
    const movesHTML=buildMovesHTML(p.id);
    const click=clickable?`onclick="handleCardClick(this,${p.id})"`:'';
    const isFR=frExclusive.has(p.id),isLG=lgExclusive.has(p.id);
    const verClass=isFR?' fr-exclusive':isLG?' lg-exclusive':'';
    const verBadge=isFR?'<span class="ver-badge fr">FR</span>':isLG?'<span class="ver-badge lg">LG</span>':'';
    return `<div class="card${verClass}" data-id="${p.id}" ${click}>
        ${verBadge}
        ${clickable?'<span class="team-count-badge">0</span>':''}
        <span class="id-badge">#${String(p.id).padStart(3,'0')}</span>
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="${p.name}" loading="lazy">
        <div class="card-header"><span class="card-name">${p.name}</span>
        <div class="type-box">${p.types.map(t=>`<span class="type-pill" style="background:${typeColors[t]}">${t}</span>`).join('')}</div></div>
        <div class="section-stats${sH}"><div class="stats-box">${statsHTML}</div><div class="card-total">TOTAL: ${p.total}</div></div>
        ${evoHTML?`<div class="section-evo${eH}">${evoHTML}</div>`:''}
        ${movesHTML?`<div class="section-moves${mH}">${movesHTML}</div>`:''}
    </div>`;
}

function updateSortUI(){
    document.querySelectorAll('.btn-sort').forEach(btn=>{
        const s=activeSorts.find(x=>x.stat===btn.dataset.stat);
        if(s){btn.classList.add('active');btn.innerHTML=`${s.stat.toUpperCase()} ${s.dir==='desc'?'&#9660;':'&#9650;'} <span style="background:var(--pk-red);color:white;border-radius:10px;padding:0 4px;font-size:0.6rem">${activeSorts.indexOf(s)+1}</span>`;}
        else{btn.classList.remove('active');btn.innerHTML=btn.dataset.stat.toUpperCase();}
    });
}

function init(){
    const fc=document.getElementById('type-filters');
    Object.keys(typeColors).forEach(type=>{
        const s=document.createElement('span');s.className='type-pill';s.style.backgroundColor=typeColors[type];s.innerText=type;s.onclick=()=>toggleFilter(type,s);fc.insertBefore(s,fc.lastElementChild);
    });
    const sc=document.getElementById('sort-btns');
    ['id','hp','atk','def','spa','spd','spe','total'].forEach(s=>{
        const b=document.createElement('button');b.className='btn-sort';b.dataset.stat=s;b.innerText=s.toUpperCase();b.onclick=()=>handleSort(s);sc.appendChild(b);
    });
    addTeamRow();render();
}
init();
